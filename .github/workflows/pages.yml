name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "chapters/**"
      - "README.md"
      - "members.md"
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        run: npm run build
      - uses: actions/configure-pages@v5
        with:
          # 워크플로의 GITHUB_TOKEN(pages:write)으로 Pages 최초 활성화를 시도.
          # 조직/저장소 설정이 허용하면 admin 수동 설정 없이 자동 활성화된다.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
